<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners -->
  <rect width="64" height="64" rx="6.4" fill="#FFFFFF"/>
  
  <!-- Make.com logo - centered and properly proportioned -->
  <g transform="translate(12, 18)">
    <!-- Left segment - three descending bars (magenta to pink gradient) -->
    <rect x="0" y="0" width="4.5" height="20" rx="1" fill="#FF00FF"/>
    <rect x="6.5" y="2.5" width="4.5" height="17.5" rx="1" fill="#E91E63"/>
    <rect x="13" y="5" width="4.5" height="15" rx="1" fill="#9C27B0"/>
    
    <!-- Middle segment - two vertical bars (purple) -->
    <rect x="22" y="0" width="5" height="20" rx="1" fill="#673AB7"/>
    <rect x="30" y="0" width="5" height="20" rx="1" fill="#673AB7"/>
    
    <!-- Right segment - single vertical bar (purple) -->
    <rect x="40" y="0" width="5" height="20" rx="1" fill="#9C27B0"/>
  </g>
</svg>

